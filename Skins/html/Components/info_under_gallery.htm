<style>

  #series-block h2,

  #series-block h3 {

    font-size: 1.125rem;

    padding-left: 1.25rem;

  #series-block ol ol {

    list-style-type: circle;

  #series-block i {

    font-style: italic;

  #series-text-container > p > *:first-child,

  #series-text-container > p > :first-child {

    margin-top: 0 !important;

  }



  #series-text-container > p > *:last-child,

  #series-text-container > p > :last-child {

    margin-bottom: 0 !important;

  }



  /* Сворачивание через line-clamp — без JS-измерений на загрузке (меньше CLS) */

  #series-text-container:not(.expanded) #series-text {

    display: -webkit-box;

    -webkit-box-orient: vertical;

    -webkit-line-clamp: 4;

    overflow: hidden;

  }

</style>



<script>

  document.addEventListener("DOMContentLoaded", () => {

    const textEl = document.getElementById("series-text");

    const container = document.getElementById("series-text-container");

    const btn = document.getElementById("read-more-btn");

    const gradient = document.getElementById("fade-gradient");

    const block = document.getElementById("series-block");



    if (!textEl || !container || !btn) return;



    if (textEl.scrollHeight > textEl.clientHeight + 1) {

      btn.classList.remove("hidden");

      gradient.classList.remove("hidden");

    }



    btn.addEventListener("click", () => {

      if (!container.classList.contains("expanded")) {

        container.classList.add("expanded");

        btn.textContent = "Свернуть";

        gradient.classList.add("hidden");

      } else {

        container.classList.remove("expanded");

        btn.textContent = "Читать все";

        gradient.classList.remove("hidden");



        const top = block.getBoundingClientRect().top + window.scrollY - 80;

        window.scrollTo({ top, behavior: "smooth" });

      }

    });

  });

</script>
